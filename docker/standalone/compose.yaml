services:
  # ---------------------------------------------------------------------------
  # Depot (single instance, local file storage)
  # ---------------------------------------------------------------------------

  depot:
    build:
      context: ../..
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      # Flush trace spans every 1s (default 5s) so Tempo has data sooner.
      OTEL_BSP_SCHEDULE_DELAY: "1000"
    volumes:
      - depot-data:/data
      - ./depotd.toml:/etc/depot/depotd.toml:ro
    restart: unless-stopped

  # One-shot container that waits for depot to be healthy, then creates
  # the default blob store via the REST API.  Idempotent: safe to re-run.
  depot-init:
    image: alpine/curl:latest
    depends_on:
      - depot
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for depot..."
        for i in $$(seq 1 30); do
          if curl -sf http://depot:8080/api/v1/health >/dev/null 2>&1; then
            echo "Depot is ready."
            break
          fi
          if [ "$$i" = "30" ]; then echo "ERROR: depot did not start in 60s"; exit 1; fi
          sleep 2
        done

        echo "Creating default blob store..."
        code=$$(curl -s -o /dev/null -w "%{http_code}" \
          -u admin:admin \
          -X POST http://depot:8080/api/v1/stores \
          -H "Content-Type: application/json" \
          -d '{"name":"default","store_type":"file","root":"/data/blobs"}')

        if [ "$$code" = "201" ]; then echo "Store created."
        elif [ "$$code" = "409" ]; then echo "Store already exists."
        else echo "ERROR: store creation failed (HTTP $$code)"; exit 1; fi

  # ---------------------------------------------------------------------------
  # Observability – object storage for Tempo & Loki
  # ---------------------------------------------------------------------------

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: [monitoring]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: [monitoring]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/tempo
        mc mb --ignore-existing local/loki
        echo "MinIO buckets ready."

  # ---------------------------------------------------------------------------
  # Observability – trace & log backends
  # ---------------------------------------------------------------------------

  tempo:
    image: grafana/tempo:2.10.3
    profiles: [monitoring]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.1
    profiles: [monitoring]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability – collectors & metrics
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    profiles: [monitoring]
    depends_on:
      - tempo
      - loki
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.1
    profiles: [monitoring]
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability – Grafana
  # ---------------------------------------------------------------------------

  grafana:
    image: grafana/grafana:12.0.1
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./monitoring/grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/default.yaml:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  depot-data:
  minio-data:
  tempo-data:
