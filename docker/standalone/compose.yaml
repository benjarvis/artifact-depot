services:
  # ---------------------------------------------------------------------------
  # Depot (single instance, local file storage)
  # ---------------------------------------------------------------------------

  depot:
    build:
      context: ../..
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      # Flush trace spans every 1s (default 5s) so Tempo has data sooner.
      OTEL_BSP_SCHEDULE_DELAY: "1000"
    volumes:
      - depot-data:/data
      - ./depotd.toml:/etc/depot/depotd.toml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability – object storage for Tempo & Loki
  # ---------------------------------------------------------------------------

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: [monitoring]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: [monitoring]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/tempo
        mc mb --ignore-existing local/loki
        echo "MinIO buckets ready."

  # ---------------------------------------------------------------------------
  # Observability – trace & log backends
  # ---------------------------------------------------------------------------

  tempo:
    image: grafana/tempo:2.10.3
    profiles: [monitoring]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.1
    profiles: [monitoring]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability – collectors & metrics
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    profiles: [monitoring]
    depends_on:
      - tempo
      - loki
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.1
    profiles: [monitoring]
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability – Grafana
  # ---------------------------------------------------------------------------

  grafana:
    image: grafana/grafana:12.0.1
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      # Server-side dashboard rendering via the `renderer` sidecar.
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
    volumes:
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./monitoring/grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/default.yaml:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  # Grafana Image Renderer — runs headless Chromium inside a sidecar so
  # Grafana can server-side-render dashboard PNGs via /render/d/{uid}.
  # Used by `make observability-screenshots` to produce the docs images
  # and also available for alert-rule image attachments, PDF reports, etc.
  renderer:
    image: grafana/grafana-image-renderer:latest
    profiles: [monitoring]
    environment:
      ENABLE_METRICS: "false"
    restart: unless-stopped

volumes:
  depot-data:
  minio-data:
  tempo-data:
