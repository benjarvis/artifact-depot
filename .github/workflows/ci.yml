name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DEPOT_INSTRUMENT_FRONTEND: "1"

jobs:
  ci:
    name: lint · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mold \
            nginx \
            containerd \
            openssl \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libasound2

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: npm
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Cache cargo registry/target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny and cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-about

      - name: Install frontend deps
        working-directory: ui/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui/frontend
        run: npx playwright install

      # --- Lints (each step runs even if a previous one failed) ---

      - name: Lint · cargo fmt
        if: success() || failure()
        run: cargo fmt --check

      - name: Lint · cargo clippy
        if: success() || failure()
        run: cargo clippy -- -D warnings

      - name: Lint · cargo-deny licenses
        if: success() || failure()
        run: cargo deny check licenses

      - name: Lint · cargo-deny advisories
        if: success() || failure()
        run: cargo deny check advisories

      - name: Lint · npm license-checker
        if: success() || failure()
        working-directory: ui/frontend
        run: npx --yes license-checker --failOn 'GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0;SSPL-1.0;EUPL-1.1;EUPL-1.2' > /dev/null

      - name: Lint · npm audit
        if: success() || failure()
        working-directory: ui/frontend
        run: npm audit

      - name: Lint · REUSE compliance
        if: success() || failure()
        uses: fsfe/reuse-action@v3

      # --- Notices (prerequisite of build) ---

      - name: Notices · cargo
        run: bash scripts/generate-notices-cargo.sh

      - name: Notices · npm
        run: bash scripts/generate-notices-npm.sh

      - name: Notices · combined
        run: bash scripts/generate-notices.sh

      # --- Build ---

      - name: Build · cargo build
        run: cargo build

      # --- Tests ---

      - name: Test · cargo test
        run: cargo test -q

      - name: Test · UI (Playwright in netns)
        run: sudo -E --preserve-env=PATH,HOME bash scripts/ui-test.sh --skip-build

      - name: Test · DynamoDB (skipped unless JAR installed)
        run: bash scripts/ext-test.sh dynamodb

      - name: Test · Docker auth
        run: sudo -E --preserve-env=PATH,HOME bash scripts/ext-test.sh docker-auth
