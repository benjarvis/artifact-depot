name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DEPOT_INSTRUMENT_FRONTEND: "1"
  DOCKER_MIRROR: repository.mdh.quantum.com
  APT_MIRROR: repository.mdh.quantum.com/repository/pkgs/ubuntu

jobs:
  ci:
    name: lint - build - test
    runs-on: arc-amd64
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: depot-dev:ci
          build-args: |
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}
            APT_MIRROR=${{ env.APT_MIRROR }}

      - name: Start devcontainer
        run: |
          docker run -d --name dev \
            --privileged \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CARGO_TERM_COLOR \
            -e DEPOT_INSTRUMENT_FRONTEND \
            depot-dev:ci \
            sleep infinity

      - name: Start dockerd inside devcontainer
        run: |
          # --insecure-registry 127.0.0.0/8 lets the docker-auth integration
          # test (and any future loopback registry tests) talk to a depot
          # bound on localhost without TLS chain validation against a
          # self-signed cert. It only relaxes verification for loopback IPs.
          docker exec -d dev sh -c 'dockerd --insecure-registry 127.0.0.0/8 >/var/log/dockerd.log 2>&1'
          docker exec dev sh -c '
            for i in $(seq 1 30); do
              docker info >/dev/null 2>&1 && exit 0
              sleep 1
            done
            echo "dockerd did not become ready"; tail -50 /var/log/dockerd.log; exit 1
          '

      # --- Lints (each step runs even if a previous one failed) ---
      # REUSE, cargo fmt, and cargo-deny run before npm ci and any
      # compilation so they see a clean tree (the reuse 2.x package
      # in the devcontainer does not respect .gitignore).

      - name: Lint - REUSE compliance
        if: success() || failure()
        run: docker exec dev reuse lint

      - name: Lint - cargo fmt
        if: success() || failure()
        run: docker exec dev cargo fmt --check

      - name: Lint - cargo-deny licenses
        if: success() || failure()
        run: docker exec dev cargo deny check licenses

      - name: Install frontend deps
        run: docker exec -w /workspace/ui/frontend dev npm ci

      - name: Lint - cargo clippy
        if: success() || failure()
        run: docker exec dev cargo clippy -- -D warnings

      - name: Lint - npm license-checker
        if: success() || failure()
        run: docker exec -w /workspace/ui/frontend dev npx --yes license-checker --failOn 'GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0;SSPL-1.0;EUPL-1.1;EUPL-1.2'

      # --- Notices (prerequisite of build) ---

      - name: Notices - cargo
        run: docker exec dev bash scripts/generate-notices-cargo.sh

      - name: Notices - npm
        run: docker exec dev bash scripts/generate-notices-npm.sh

      - name: Notices - combined
        run: docker exec dev bash scripts/generate-notices.sh

      # --- Build ---

      - name: Build - cargo build
        run: docker exec dev cargo build

      # --- Tests ---

      - name: Test - cargo test
        run: docker exec dev cargo test -q

      - name: Test - UI (Playwright in netns)
        run: docker exec dev bash scripts/ui-test.sh --skip-build

      - name: Test - DynamoDB
        run: docker exec -e DYNAMODB_LOCAL_DIR=/usr/local/lib/dynamodb-local dev bash scripts/ext-test.sh dynamodb

      - name: Test - Docker auth
        run: docker exec dev bash scripts/ext-test.sh docker-auth

      - name: Stop devcontainer
        if: always()
        run: docker rm -f dev || true

  release-build:
    name: build release image (${{ matrix.platform }})
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
          - platform: linux/arm64
            runner: arc-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release-manifest:
    name: combine multi-arch manifest
    needs: release-build
    runs-on: arc-amd64
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
