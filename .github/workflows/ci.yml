name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DEPOT_INSTRUMENT_FRONTEND: "1"

jobs:
  ci:
    name: lint - build - test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: depot-dev:ci
          cache-from: type=gha,scope=devcontainer
          cache-to: type=gha,mode=max,scope=devcontainer

      - name: Start devcontainer
        run: |
          docker run -d --name dev \
            --cap-add=SYS_ADMIN --cap-add=NET_ADMIN \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CARGO_TERM_COLOR \
            -e DEPOT_INSTRUMENT_FRONTEND \
            depot-dev:ci \
            sleep infinity

      - name: Install frontend deps
        run: docker exec -w /workspace/ui/frontend dev npm ci

      # --- Lints (each step runs even if a previous one failed) ---

      - name: Lint - cargo fmt
        if: success() || failure()
        run: docker exec dev cargo fmt --check

      - name: Lint - cargo clippy
        if: success() || failure()
        run: docker exec dev cargo clippy -- -D warnings

      - name: Lint - cargo-deny licenses
        if: success() || failure()
        run: docker exec dev cargo deny check licenses

      - name: Lint - cargo-deny advisories
        if: success() || failure()
        run: docker exec dev cargo deny check advisories

      - name: Lint - npm license-checker
        if: success() || failure()
        run: docker exec -w /workspace/ui/frontend dev npx --yes license-checker --failOn 'GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0;SSPL-1.0;EUPL-1.1;EUPL-1.2'

      - name: Lint - npm audit
        if: success() || failure()
        run: docker exec -w /workspace/ui/frontend dev npm audit

      - name: Lint - REUSE compliance
        if: success() || failure()
        run: docker exec dev reuse lint

      # --- Notices (prerequisite of build) ---

      - name: Notices - cargo
        run: docker exec dev bash scripts/generate-notices-cargo.sh

      - name: Notices - npm
        run: docker exec dev bash scripts/generate-notices-npm.sh

      - name: Notices - combined
        run: docker exec dev bash scripts/generate-notices.sh

      # --- Build ---

      - name: Build - cargo build
        run: docker exec dev cargo build

      # --- Tests ---

      - name: Test - cargo test
        run: docker exec dev cargo test -q

      - name: Test - UI (Playwright in netns)
        run: docker exec dev bash scripts/ui-test.sh --skip-build

      - name: Test - DynamoDB
        run: docker exec -e DYNAMODB_LOCAL_DIR=/usr/local/lib/dynamodb-local dev bash scripts/ext-test.sh dynamodb

      - name: Test - Docker auth (skipped without dind)
        run: docker exec dev bash scripts/ext-test.sh docker-auth

      - name: Stop devcontainer
        if: always()
        run: docker rm -f dev || true

  release:
    name: build and publish release image
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
