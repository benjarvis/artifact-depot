default_admin_password = "admin"

[http]
listen = "0.0.0.0:8080"

[kv_store]
type = "redb"
path = "build/demo/depot.redb"

# Operational settings (access_log, cors, rate_limit, etc.) are managed
# via the Settings API: GET/PUT /api/v1/settings
# Blob stores are managed via the Stores API: /api/v1/stores

# [tracing]
# otlp_endpoint = "http://localhost:4317"

# Optional: declarative first-start initialization. If `[initialization]` is
# present and the KV store is fresh (no users yet), the listed roles, stores,
# repositories, users, and settings are created at startup so the instance is
# fully configured without REST API calls. Ignored on already-initialized KVs.
# See `etc/depotd.init.example.toml` for a fully populated example.
#
# [initialization]
# [[initialization.stores]]
# name = "local-files"
# store_type = "file"
# root = "/var/lib/depot/blobs"
