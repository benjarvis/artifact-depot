[graph]
targets = []
all-features = false
no-default-features = false

[licenses]
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MIT-0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
    "BSD-1-Clause",
]

exceptions = [
    # bzip2-1.0.6 is a permissive BSD-like license but not a standard SPDX identifier
    { allow = ["bzip2-1.0.6"], crate = "libbz2-rs-sys" },
    # CDLA-Permissive-2.0 is a permissive data license, compatible with Apache-2.0
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
ignore = [
    # rsa timing sidechannel (Marvin Attack) — transitive dep via pgp/rpm,
    # no upstream fix available yet. We only verify RPM signatures, not generate them.
    "RUSTSEC-2023-0071",
    # serde_yml unsoundness — transitive dep via depot-format-helm,
    # no safe upgrade available yet.
    "RUSTSEC-2025-0068",
    # rand 0.8 thread_rng unsoundness — requires custom logger calling
    # thread_rng during reseed, which we never do. Pinned to 0.8 by
    # transitive deps; will resolve when deps migrate to rand 0.9+.
    "RUSTSEC-2026-0097",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
