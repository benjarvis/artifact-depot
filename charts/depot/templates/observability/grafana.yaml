{{- if .Values.observability.enabled -}}
{{- $name := printf "%s-grafana" (include "depot.fullname" .) -}}
{{- $tempoName := printf "%s-tempo" (include "depot.fullname" .) -}}
{{- $lokiName := printf "%s-loki" (include "depot.fullname" .) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "grafana") | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://{{ $tempoName }}:3200
        isDefault: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          serviceMap:
            datasourceUid: tempo
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://{{ $lokiName }}:3100
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "grafana") | nindent 4 }}
spec:
  type: {{ .Values.observability.grafana.serviceType }}
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    {{- include "depot.obs.selectorLabels" (list . "grafana") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "grafana") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "depot.obs.selectorLabels" (list . "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "depot.obs.selectorLabels" (list . "grafana") | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          env:
            {{- if .Values.observability.grafana.anonymousAccess }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            {{- end }}
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          {{- with .Values.observability.grafana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: datasources
          configMap:
            name: {{ $name }}
{{- end -}}
