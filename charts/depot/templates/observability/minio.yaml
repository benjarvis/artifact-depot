{{- if .Values.observability.enabled -}}
{{- $name := printf "%s-minio" (include "depot.fullname" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "minio") | nindent 4 }}
type: Opaque
stringData:
  root-user: {{ .Values.observability.minio.rootUser | quote }}
  root-password: {{ .Values.observability.minio.rootPassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "minio") | nindent 4 }}
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    {{- include "depot.obs.selectorLabels" (list . "minio") | nindent 4 }}
{{- if .Values.observability.minio.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "minio") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.observability.minio.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.minio.persistence.size | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "depot.obs.labels" (list . "minio") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "depot.obs.selectorLabels" (list . "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "depot.obs.selectorLabels" (list . "minio") | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.observability.minio.image }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: root-password
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.observability.minio.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.observability.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init
  labels:
    {{- include "depot.obs.labels" (list . "minio") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "depot.obs.selectorLabels" (list . "minio") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: root-password
            - name: MINIO_URL
              value: "http://{{ $name }}:9000"
          command: ["/bin/sh", "-c"]
          args:
            - |
              for i in $(seq 1 60); do
                if mc alias set local "$MINIO_URL" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              mc mb --ignore-existing local/tempo
              mc mb --ignore-existing local/loki
              echo "MinIO buckets ready."
{{- end -}}
