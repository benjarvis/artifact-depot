{{- if and .Values.aws.enabled (not .Values.aws.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "depot.awsSecretName" . }}
  labels:
    {{- include "depot.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ required "aws.accessKeyId is required when aws.enabled is true and aws.existingSecret is empty" .Values.aws.accessKeyId | quote }}
  secret-access-key: {{ required "aws.secretAccessKey is required when aws.enabled is true and aws.existingSecret is empty" .Values.aws.secretAccessKey | quote }}
{{- end -}}
