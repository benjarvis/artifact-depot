{{/*
The full depotd.toml lives in a Secret so that default_admin_password and
server_secret are never stored in plain ConfigMaps. All non-sensitive fields
are rendered here too -- depot only reads a single config file.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "depot.configSecretName" . }}
  labels:
    {{- include "depot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.config.defaultAdminPassword }}
  admin-password: {{ .Values.config.defaultAdminPassword | quote }}
  {{- end }}
  depotd.toml: |
    {{- if .Values.config.defaultAdminPassword }}
    default_admin_password = {{ .Values.config.defaultAdminPassword | quote }}
    {{- end }}
    {{- if .Values.config.serverSecret }}
    server_secret = {{ .Values.config.serverSecret | quote }}
    {{- end }}
    {{- if .Values.config.metricsListen }}
    metrics_listen = {{ .Values.config.metricsListen | quote }}
    {{- end }}

    [http]
    listen = "0.0.0.0:8080"

    [kv_store]
    {{- if eq .Values.kvStore.type "redb" }}
    type = "redb"
    path = {{ .Values.kvStore.redb.path | quote }}
    {{- else if eq .Values.kvStore.type "dynamodb" }}
    type = "dynamodb"
    table_prefix = {{ .Values.kvStore.dynamodb.tablePrefix | quote }}
    region = {{ .Values.kvStore.dynamodb.region | quote }}
    {{- if .Values.kvStore.dynamodb.endpointUrl }}
    endpoint_url = {{ .Values.kvStore.dynamodb.endpointUrl | quote }}
    {{- end }}
    max_retries = {{ .Values.kvStore.dynamodb.maxRetries }}
    connect_timeout_secs = {{ .Values.kvStore.dynamodb.connectTimeoutSecs }}
    read_timeout_secs = {{ .Values.kvStore.dynamodb.readTimeoutSecs }}
    retry_mode = {{ .Values.kvStore.dynamodb.retryMode | quote }}
    {{- else }}
    {{- fail (printf "kvStore.type must be \"redb\" or \"dynamodb\", got %q" .Values.kvStore.type) }}
    {{- end }}

    {{- $otlp := include "depot.otlpEndpoint" . }}
    {{- if and .Values.tracing.enabled $otlp }}

    [tracing]
    otlp_endpoint = {{ $otlp | quote }}
    service_name = {{ .Values.tracing.serviceName | quote }}
    {{- if .Values.tracing.deploymentEnvironment }}
    deployment_environment = {{ .Values.tracing.deploymentEnvironment | quote }}
    {{- end }}
    {{- if .Values.tracing.samplingRatio }}
    sampling_ratio = {{ printf "%.4f" .Values.tracing.samplingRatio }}
    {{- end }}
    {{- end }}
